      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      height: 100vh;
      margin: 0;
      padding: 0;
      font-size: clamp(.5rem, 2.5vmin, 1.5rem);
      overflow: hidden;
    }
    
    .keyboard {
      display: grid;
      grid-template-columns: repeat(20, minmax(auto, 1.25em));
      grid-auto-rows: 3em;
      gap: .25em;
      justify-content: center;
      padding: 0.5em 1em 1.2em;
      background: transparent;
    }
    
    .key {
      font-size: inherit;
      grid-column: span 2;
      border: 1px solid rgba(180, 130, 40, 0.5);
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: hsla(
        var(--hue, 35),
        var(--saturation, 40%),
        calc(var(--lightness-offset, 0%) + var(--lightness, 22%)),
        0.75
      );
      color: #e8c97a;
      fill: #e8c97a;
      text-transform: uppercase;
      border-radius: .15em;
      cursor: pointer;
      user-select: none;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      text-shadow: 0 0 6px rgba(255, 200, 80, 0.5);
      backdrop-filter: blur(1px);
    }
    
    .key.large {
      grid-column: span 3;
    }
    
    .key > svg {
      width: 1.75em;
      height: 1.75em;
    }
    
    .key:hover, .key:focus {
      --lightness-offset: 10%;
    }
    
    .key.wrong {
      --lightness: 23%;
    }
    
    .key.wrong-location {
      --hue: 49;
      --saturation: 51%;
      --lightness: 47%;
    }
    
    .key.correct {
      --hue: 115;
      --saturation: 29%;
      --lightness: 43%;
    }
    
    /* 已修改為4行猜測格子 */
    .guess-grid {
      display: grid;
      justify-content: center;
      align-content: center;
      grid-template-columns: repeat(4, 4.5em);
      grid-template-rows: repeat(4, 4.5em);
      gap: .4em;
      /* Position grid to align with arch window in background */
      margin: 0 auto;
      padding-top: 9vh;
      padding-bottom: 1vh;
    }
    
    .tile {
      font-size: 2em;
      color: #f5e6c8;
      border: .1em solid rgba(210, 160, 60, 0.6);
      text-transform: uppercase;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
      transition: transform 250ms linear;
      background-color: rgba(20, 10, 5, 0.55);
      backdrop-filter: blur(2px);
      text-shadow: 0 0 8px rgba(255, 200, 80, 0.8);
      font-family: 'Courier New', monospace;
    }
    
    .tile[data-state="active"] {
      border-color: hsl(200, 1%, 34%);
    }
    
    .tile[data-state="wrong"] {
      border: none;
      background-color: hsl(240, 2%, 23%);
    }
    
    .tile[data-state="wrong-location"] {
      border: none;
      background-color: hsl(49, 51%, 47%);
    }
    
    .tile[data-state="correct"] {
      border: none;
      background-color: hsl(115, 29%, 43%);
    }
    
    .tile.shake {
      animation: shake 250ms ease-in-out;
    }
    
    .tile.dance {
      animation: dance 500ms ease-in-out;
    }
    
    .tile.flip {
      transform: rotateX(90deg);
    }
    
    @keyframes shake {
      10% { transform: translateX(-5%); }
      30% { transform: translateX(5%); }
      50% { transform: translateX(-7.5%); }
      70% { transform: translateX(7.5%); }
      90% { transform: translateX(-5%); }
      100% { transform: translateX(0); }
    }
    
    @keyframes dance {
      20% { transform: translateY(-50%); }
      40% { transform: translateY(5%); }
      60% { transform: translateY(-25%); }
      80% { transform: translateY(2.5%); }
      90% { transform: translateY(-5%); }
      100% { transform: translateY(0); }
    }
    
    .alert-container {
      position: fixed;
      top: 10vh;
      left: 50vw;
      transform: translateX(-50%);
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .alert {
      pointer-events: none;
      background-color: rgba(40, 25, 8, 0.92); color: #f5d87a; border: 1px solid rgba(200,150,50,0.6);
      padding: .75em;
      border-radius: .25em;
      opacity: 1;
      transition: opacity 500ms ease-in-out;
      margin-bottom: .5em;
    }
    
    .alert:last-child {
      margin-bottom: 0;
    }
    
    .alert.hide {
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="alert-container" data-alert-container></div>
  <div style="text-align:center; padding: 0.8vh 0 0; color: #f0c96a; font-family: 'Courier New', monospace; font-size: clamp(0.7rem, 2vmin, 1.1rem); letter-spacing: 0.3em; text-transform: uppercase; text-shadow: 0 0 12px rgba(255,180,50,0.9), 0 0 24px rgba(255,120,0,0.4);">✦ Arcane Lexicon ✦</div>
  
  <!-- 4行x4列的猜測格子 -->
  <div data-guess-grid class="guess-grid">
    <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
    <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
    <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
    <div class="tile"></div><div class="tile"></div><div class="tile"></div><div class="tile"></div>
  </div>

  <div data-keyboard class="keyboard">
    <button class="key" data-key="Q">Q</button>
    <button class="key" data-key="W">W</button>
    <button class="key" data-key="E">E</button>
    <button class="key" data-key="R">R</button>
    <button class="key" data-key="T">T</button>
    <button class="key" data-key="Y">Y</button>

    // DOM元素獲取
    const keyboard = document.querySelector("[data-keyboard]")
    const alertContainer = document.querySelector("[data-alert-container]")
    const guessGrid = document.querySelector("[data-guess-grid]")
    
    // 隨機選取目標詞
    const targetWord = targetWords[Math.floor(Math.random() * targetWords.length)]
    console.log("目標詞:", targetWord) // 控制台調試用

    // 啟動遊戲互動
    startInteraction()

    function startInteraction() {
      document.addEventListener("click", handleMouseClick)
      document.addEventListener("keydown", handleKeyPress)
    }

    function stopInteraction() {
      document.removeEventListener("click", handleMouseClick)
      document.removeEventListener("keydown", handleKeyPress)
    }

    // 滑鼠點擊事件
    function handleMouseClick(e) {
      if (e.target.matches("[data-key]")) {
        pressKey(e.target.dataset.key)
        return
      }
      if (e.target.matches("[data-enter]")) {
        submitGuess()
        return
      }
      if (e.target.matches("[data-delete]")) {
        deleteKey()
        return
      }
    }

    // 鍵盤按鍵事件
    function handleKeyPress(e) {
      if (e.key === "Enter") {
        submitGuess()
        return
      }
      if (e.key === "Backspace" || e.key === "Delete") {
        deleteKey()
        return
      }
      if (e.key.match(/^[a-z]$/i)) {
        pressKey(e.key)
        return
      }
    }

    // 按鍵輸入邏輯
    function pressKey(key) {
      const activeTiles = getActiveTiles()
      if (activeTiles.length >= WORD_LENGTH) return
      const nextTile = guessGrid.querySelector(":not([data-letter])")
      const keyUpper = key.toUpperCase()
      nextTile.dataset.letter = keyUpper
      nextTile.textContent = keyUpper
      nextTile.dataset.state = "active"
    }

    // 刪除邏輯
    function deleteKey() {
      const activeTiles = getActiveTiles()
      const lastTile = activeTiles[activeTiles.length - 1]
      if (lastTile == null) return
      lastTile.textContent = ""
      delete lastTile.dataset.state
      delete lastTile.dataset.letter
    }

    // 提交猜測邏輯
    function submitGuess() {
      const activeTiles = [...getActiveTiles()]
      if (activeTiles.length !== WORD_LENGTH) {
        showAlert("Not enough letters")
        shakeTiles(activeTiles)
        return
      }

      const guess = activeTiles.reduce((word, tile) => {
        return word + tile.dataset.letter
      }, "")

      if (!dictionary.includes(guess)) {
        showAlert("Not in word list")
        shakeTiles(activeTiles)
        return
      }

      stopInteraction()
      activeTiles.forEach((...params) => flipTile(...params, guess))
    }

    // 翻牌動畫與狀態更新
    function flipTile(tile, index, array, guess) {
      const letter = tile.dataset.letter
      const key = keyboard.querySelector(`[data-key="${letter}"i]`)
      
      setTimeout(() => {
        tile.classList.add("flip")
      }, (index * FLIP_ANIMATION_DURATION) / 2)

      tile.addEventListener(
        "transitionend",
        () => {
          tile.classList.remove("flip")
          if (targetWord[index] === letter) {
            tile.dataset.state = "correct"
            key.classList.add("correct")
          } else if (targetWord.includes(letter)) {
            tile.dataset.state = "wrong-location"
            key.classList.add("wrong-location")
          } else {
            tile.dataset.state = "wrong"
            key.classList.add("wrong")
          }

          if (index === array.length - 1) {
            tile.addEventListener(
              "transitionend",
              () => {
                startInteraction()
                checkWinLose(guess, array)
              },
              { once: true }
            )
          }
        },
        { once: true }
      )
    }

    // 獲取當前激活的格子
    function getActiveTiles() {
      return guessGrid.querySelectorAll('[data-state="active"]')
    }

    // 提示彈窗
    function showAlert(message, duration = 1000) {
      const alert = document.createElement("div")
      alert.textContent = message
      alert.classList.add("alert")
      alertContainer.prepend(alert)
      if (duration == null) return

      setTimeout(() => {
        alert.classList.add("hide")
        alert.addEventListener("transitionend", () => {
          alert.remove()
        })
      }, duration)
    }

    // 抖動動畫
    function shakeTiles(tiles) {
      tiles.forEach(tile => {
        tile.classList.add("shake")
        tile.addEventListener(
          "animationend",
          () => {
            tile.classList.remove("shake")
          },
          { once: true }
        )
      })
    }

    // 勝負判斷
    function checkWinLose(guess, tiles) {
      if (guess === targetWord) {
        showAlert("You Win", 5000)
        danceTiles(tiles)
        stopInteraction()
        return
      }

      const remainingTiles = guessGrid.querySelectorAll(":not([data-letter])")
      if (remainingTiles.length === 0) {
        showAlert(`Answer: ${targetWord.toUpperCase()}`, null)
        stopInteraction()
      }
    }

    // 勝利跳舞動畫
    function danceTiles(tiles) {
      tiles.forEach((tile, index) => {
        setTimeout(() => {
          tile.classList.add("dance")
          tile.addEventListener(
            "animationend",
            () => {
              tile.classList.remove("dance")
            },
            { once: true }
          )
        }, (index * DANCE_ANIMATION_DURATION) / 5)
      })
    }
  </script>
</body>
</html>
